<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Calyx Budget</title>
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #f0f0f5; }
    .glass { background: rgba(255,255,255,0.72); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
    .dark-glass { background: #1e1b2e; color: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .purple-glow { background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%); }
    .input-reset { background: #f3f4f6; border: none; outline: none; transition: all 0.2s; }
    .input-reset:focus { background: #e5e7eb; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .btn-press:active { transform: scale(0.96); }
    .sync-badge { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .balance-btn { transition: all 0.2s; border: 2px solid transparent; }
    .balance-btn:hover { transform: translateY(-2px); }
    .balance-btn.selected { border-color: #7c3aed; background: #f3f0ff; }

    [data-theme="dark"] body { background: #0b0b14; color: #e5e7eb; }
    [data-theme="dark"] .glass { background: rgba(23, 22, 35, 0.9); border-color: rgba(255,255,255,0.06); box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
    [data-theme="dark"] header.glass { background: rgba(23, 22, 35, 0.95); }
    [data-theme="dark"] .dark-glass { background: #161524; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
    [data-theme="dark"] .bg-white { background-color: #1e1b2e; }
    [data-theme="dark"] .text-gray-900 { color: #f3f4f6; }
    [data-theme="dark"] .text-gray-800 { color: #e5e7eb; }
    [data-theme="dark"] .text-gray-700 { color: #d1d5db; }
    [data-theme="dark"] .text-gray-600 { color: #9ca3af; }
    [data-theme="dark"] .text-gray-500 { color: #9ca3af; }
    [data-theme="dark"] .text-gray-400 { color: #6b7280; }
    [data-theme="dark"] .text-gray-300 { color: #d1d5db; }
    [data-theme="dark"] .border-gray-100 { border-color: rgba(255,255,255,0.06); }
    [data-theme="dark"] .border-gray-200 { border-color: rgba(255,255,255,0.08); }
    [data-theme="dark"] .input-reset { background: #2d2a3d; color: #e5e7eb; }
    [data-theme="dark"] .input-reset:focus { background: #3d3a4f; }
    [data-theme="dark"] .bg-gray-100 { background-color: #2d2a3d; }
    [data-theme="dark"] .bg-gray-50 { background-color: #1e1b2e; }
    [data-theme="dark"] .bg-gray-300 { background-color: #4b5563; }
    [data-theme="dark"] .bg-red-50 { background-color: rgba(239,68,68,0.1); }
    [data-theme="dark"] .bg-orange-50 { background-color: rgba(249,115,22,0.1); }
    [data-theme="dark"] .bg-purple-50 { background-color: rgba(139,92,246,0.1); }
    [data-theme="dark"] .bg-emerald-50 { background-color: rgba(16,185,129,0.1); }
    [data-theme="dark"] .modal-panel { background: #1e1b2e; color: #e5e7eb; }
    [data-theme="dark"] .modal-panel .bg-gray-100 { background-color: #2d2a3d; }
    [data-theme="dark"] .balance-btn.selected { background: #2d2a3d; border-color: #a78bfa; }
    [data-theme="dark"] .text-red-500 { color: #f87171; }
    [data-theme="dark"] .text-orange-600 { color: #fb923c; }
    [data-theme="dark"] .text-orange-500 { color: #f97316; }
    [data-theme="dark"] .text-orange-700 { color: #fb923c; }
    [data-theme="dark"] .text-emerald-400 { color: #34d399; }
    [data-theme="dark"] .text-emerald-300 { color: #6ee7b7; }
    [data-theme="dark"] .text-emerald-200 { color: #a7f3d0; }
    [data-theme="dark"] .text-emerald-700 { color: #34d399; }
    [data-theme="dark"] .text-purple-600 { color: #a78bfa; }
    [data-theme="dark"] .text-purple-100 { color: #ddd6fe; }
    [data-theme="dark"] .text-red-300 { color: #fca5a5; }
    [data-theme="dark"] .border-emerald-500\/30 { border-color: rgba(16,185,129,0.3); }
    [data-theme="dark"] .ring-emerald-400 { --tw-ring-color: #34d399; }
    [data-theme="dark"] #categoryLegend .text-white { color: #f3f4f6; }
    [data-theme="dark"] #categoryLegend .text-gray-300 { color: #d1d5db; }
    [data-theme="dark"] .sync-badge { border-color: #0b0b14; }
  </style>
<base target="_blank">
</head>
<body class="text-gray-800 antialiased">

  <header class="sticky top-0 z-40 glass px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg purple-glow flex items-center justify-center text-white font-bold text-sm relative">
        CB
        <span id="syncDot" class="absolute -top-1 -right-1 w-3 h-3 bg-emerald-400 rounded-full border-2 border-white hidden sync-badge"></span>
      </div>
      <div>
        <h1 class="font-bold text-gray-900 leading-tight text-sm">Dashboard</h1>
        <p class="text-[10px] text-gray-500 leading-tight" id="syncStatus">Local only</p>
      </div>
    </div>
    <div class="flex gap-2 items-center">
      <button onclick="toggleTheme()" id="themeBtn" class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 btn-press" title="Toggle theme">
        <span id="themeIcon">🌙</span>
      </button>
      <button id="signInBtn" onclick="signInWithGoogle()" class="bg-white border border-gray-200 text-gray-700 px-3 py-2 rounded-full text-xs font-medium btn-press hidden">Sign In</button>
      <button id="signOutBtn" onclick="signOut()" class="bg-red-50 border border-red-200 text-red-600 px-3 py-2 rounded-full text-xs font-medium btn-press hidden">Sign Out</button>
      <button onclick="openModal('goalModal')" class="bg-white border border-gray-200 text-gray-700 px-3 py-2 rounded-full text-xs font-medium btn-press hidden sm:block">+ Goal</button>
      <button onclick="openModal('billModal')" class="bg-gray-900 text-white px-4 py-2 rounded-full text-sm font-medium btn-press">+ Add Bill</button>
    </div>
  </header>

  <main class="p-4 pb-24 max-w-6xl mx-auto space-y-4">

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div class="lg:col-span-2 glass rounded-3xl p-5 card-anim">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-semibold text-gray-700 text-sm uppercase tracking-wide">Financial Overview</h2>
          <button onclick="openBalanceModal()" class="text-xs text-purple-600 font-medium hover:text-purple-800 btn-press flex items-center gap-1">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            Edit Balance
          </button>
        </div>
        <div class="grid grid-cols-3 gap-3 mb-5">
          <div class="bg-white rounded-2xl p-3 shadow-sm relative overflow-hidden">
            <p class="text-[10px] text-gray-500 mb-1">Total Balance</p>
            <p class="text-xl font-bold text-gray-900" id="balanceDisplay">$0</p>
            <div class="absolute top-0 right-0 w-16 h-16 bg-purple-100 rounded-full -mr-8 -mt-8 opacity-40"></div>
          </div>
          <div class="bg-white rounded-2xl p-3 shadow-sm relative overflow-hidden">
            <p class="text-[10px] text-gray-500 mb-1">Total Bills</p>
            <p class="text-xl font-bold text-red-500" id="billsDisplay">$0</p>
            <div class="absolute top-0 right-0 w-16 h-16 bg-red-100 rounded-full -mr-8 -mt-8 opacity-40"></div>
          </div>
          <div class="dark-glass rounded-2xl p-3 relative overflow-hidden">
            <p class="text-[10px] text-gray-400 mb-1">Surplus</p>
            <p class="text-xl font-bold" id="surplusDisplay">$0</p>
          </div>
        </div>
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <div class="flex justify-between text-[10px] text-gray-400 mb-2">
            <span>Balance Allocation</span>
            <span id="allocationText">Bills 0% • Goals 0% • Free 100%</span>
          </div>
          <div class="h-3 bg-gray-100 rounded-full overflow-hidden flex">
            <div id="barBills" class="h-full bg-red-400 transition-all duration-700" style="width:0%"></div>
            <div id="barGoals" class="h-full bg-purple-400 transition-all duration-700" style="width:0%"></div>
            <div id="barFree" class="h-full bg-emerald-400 transition-all duration-700" style="width:100%"></div>
          </div>
          <div class="flex justify-between mt-2 text-[10px]">
            <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-red-400"></div><span class="text-gray-500">Bills</span></div>
            <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-purple-400"></div><span class="text-gray-500">Goals</span></div>
            <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-emerald-400"></div><span class="text-gray-500">Free Cash</span></div>
          </div>
        </div>
      </div>

      <div class="dark-glass rounded-3xl p-5 card-anim flex flex-col justify-between">
        <h2 class="font-semibold text-sm uppercase tracking-wide text-gray-300 mb-4">Budget Status</h2>
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div class="purple-glow rounded-2xl p-3 text-white">
            <p class="text-[10px] text-purple-100 mb-1">Bills to Pay</p>
            <p class="text-3xl font-bold" id="billCount">0</p>
          </div>
          <div class="bg-emerald-500/20 border border-emerald-500/30 rounded-2xl p-3">
            <p class="text-[10px] text-emerald-200 mb-1">Free Cash</p>
            <p class="text-3xl font-bold" id="freeCashDisplay">$0</p>
          </div>
        </div>
        <div class="bg-white/10 rounded-2xl p-3">
          <div class="flex justify-between text-xs mb-2">
            <span class="text-gray-300">Goal Progress</
